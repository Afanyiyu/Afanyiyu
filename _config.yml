title: "IlHarper's Blog"
# subtitle: ''
description: '耳を澄ましてはいけません。'
keywords: ilharper
author: Il Harper
language: 'zh-CN'
timezone: ''

url: https://ilharper.vbox.moe
# permalink: :year/:month/:day/:title/
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

index_generator:
  path: ''
  per_page: 15
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

per_page: 15
pagination_dir: page

include:
exclude:
ignore:

theme: next

deploy:
  type: git
  repo:
    github:
      url: https://github.com/Afanyiyu/ilharper-vbox-moe.git
      branch: master
      token: $VERCEL_DEPLOY_TOKEN
  message: 'IlHarper Blog Deploy'
  name: 'Il Harper'
  email: 'afanyiyu@hotmail.com'
